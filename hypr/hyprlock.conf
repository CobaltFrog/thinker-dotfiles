$monitor_0_name = DP-2
$monitor_1_name = HDMI-A-1
$wallpaper_lockscreen = ~/wallpaper/city.png


$transparent = rgba(00000000)
$background_normal = rgb(2c2a24)
$background_light = rgb(3a372f)
$background_dark = rgb(14161b)
$foreground_normal = rgb(fbad30)
$foreground_dark = rgb(cc820c)
$foreground_light = rgb(fac269)
$second_foreground_normal = rgb(36d67b)
$second_foreground_light = rgb(61f2a0)
$second_foreground_dark = rgb(09963b)
$accent_normal = rgb(4a9191)
$accent_light = rgb(73e6e6)
$accent_dark = rgb(0e9c9c)
$text_normal = rgb(faf7f2)
$text_light = rgb(ffffff)
$text_dark = rgb(d4c7c7)
$error_color = rgb(bd3131)
$warning_color = rgb(ffff32)
$success_color = rgb(31bd38)

general {
    hide_cursor = true
    no_fade_in = false
    grace = 30
}

#background for main monitor
background {
    monitor = $monitor_0_name
    path = $wallpaper_lockscreen
    blur_passes = 2
    blur_size = 5
    noise = 0
    contrast = 1
    brightness = 0.5
    vibrancy = 0.3
    vibrancy_darkness = 0.1
}


background {
    monitor = $monitor_1_name
    path = $wallpaper_lockscreen
    blur_passes = 2
    blur_size = 5
    noise = 0
    contrast = 1
    brightness = 0.5
    vibrancy = 0.3
    vibrancy_darkness = 0.1
}

animations {
    bezier = easeIn, 1, 0,   1,   1
    bezier = bounceBack, 0.19, 1, 0.22, 1.05
    bezier = unlock, 0, 0.5, 0.5, 1
    bezier = lock, 0, 0.5, 1, 0.5
    
    animation = inputFieldDots, 1, 0.5, easeIn
    animation = fadeOut, 1, 5, unlock
    animation = fadeIn, 1, 5, unlock
    animation = inputFieldWidth, 1, 5, bounceBack 
    animation = inputFieldColors, 1, 5, easeIn
    animation = inputFieldFade, 1, 5, easeIn
}

input-field {
    monitor = $monitor_0_name
    size = 300, 50

    outline_thickness = 4

    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true

    outer_color = $accent_normal
    inner_color = $background_normal
    font_color = $text_normal

    fade_on_empty = false
    placeholder_text = <span color="##0e9c9c" weight="bold">$USER</span>
    dots_text_format = <span weight="bold">󰧞</span>
    fail_text = <b>$FAIL. $ATTEMPTS attempt(s)</b>
    hide_input = false

    rounding = 0

    fail_color = $error_color
    check_color = $second_foreground_normal
    capslock_color = $foreground_normal

    position = 0, 0
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = true
    fingerprint:ready_message = <span size="40pt" foreground="##FFFFFF">󰈷</span>
    fingerprint:present_message = <span size="40pt" foreground="##FFFFFF">󱏘</span>
    fingerprint:retry_delay = 500
}

#finger prompt
label {
    monitor = $monitor_0_name
    text = $FPRINTPROMPT
    color = $text_normal
    font_size = 16
    text_align = dang
    font_family = JetBrains Mono NF 
    position = 0, -60
    halign = center
    valign = center
}

# Current time on main monitor
label {
    monitor = $monitor_0_name
    text = $TIME
    color = $text_light
    font_size = 120
    font_family = JetBrains Mono NF 
    position = 0, -50
    halign = center
    valign = top
}

# current time on second monitor
label {
    monitor = $monitor_1_name
    text = <span weight="bold">$TIME</span>
    color = $text_light
    font_size = 120
    font_family = JetBrains Mono NF 
    position = 0, 0
    halign = center
    valign = center
}

# Current date
label {
    monitor = $monitor_0_name
    text = cmd[update:30000] echo "$(date +'%A, %d %B')"
    color = $text_light
    font_size = 25
    font_family = JetBrains Mono NF 
    position = 0, 0
    halign = center
    valign = top
}

# Username
label {
    monitor = $monitor_0_name
    text = <b> $DESC</b>
    color = $text_light
    font_size = 22
    font_family = JetBrains Mono NF 
    position = 0, 60
    halign = center
    valign = center
}

#current layout
label {
    monitor = $monitor_0_name
    text = $LAYOUT
    color = $text_color
    font_size = 20
    font_family = JetBrains Mono NF 
    position = 0, 0
    halign = center
    valign = bottom
}
