$mod = SUPER

# __        _____ _   _ ____   _____        ______  
# \ \      / /_ _| \ | |  _ \ / _ \ \      / / ___| 
#  \ \ /\ / / | ||  \| | | | | | | \ \ /\ / /\___ \ 
#   \ V  V /  | || |\  | |_| | |_| |\ V  V /  ___) |
#    \_/\_/  |___|_| \_|____/ \___/  \_/\_/  |____/ 
bindue = $mod, Q, killactive
bind = $mod, F, togglefloating
bind = ALT, tab, cyclenext
bind = SHIFT, tab, cyclenext, prev
bind = CONTROL, tab, focuscurrentorlast
bind = $mod, tab, cyclenext, floating

bindu = $mod, left, movefocus, l
bindu = $mod, up, movefocus, u
bindu = $mod, right, movefocus, r
bindu = $mod, down, movefocus, d

bind = $mod, H, movefocus, l
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, J, movefocus, d

# __        _____  ____  _  ______  ____   _    ____ _____ 
# \ \      / / _ \|  _ \| |/ / ___||  _ \ / \  / ___| ____|
#  \ \ /\ / / | | | |_) | ' /\___ \| |_) / _ \| |   |  _|  
#   \ V  V /| |_| |  _ <| . \ ___) |  __/ ___ \ |___| |___ 
#    \_/\_/  \___/|_| \_\_|\_\____/|_| /_/   \_\____|_____|
bindu = $mod, 1, workspace, 1
bindu = $mod, 2, workspace, 2
bindu = $mod, 3, workspace, 3
bindu = $mod, 4, workspace, 4
bindu = $mod, 5, workspace, 5
bindu = $mod, 6, workspace, 6
bindu = $mod, 7, workspace, 7
bindu = $mod, 8, workspace, 8
bindu = $mod, 9, workspace, 9
bindu = $mod, 0, workspace, 10

bindu = $mod&SHIFT, 1, movetoworkspace, 1
bindu = $mod&SHIFT, 2, movetoworkspace, 2
bindu = $mod&SHIFT, 3, movetoworkspace, 3
bindu = $mod&SHIFT, 4, movetoworkspace, 4
bindu = $mod&SHIFT, 5, movetoworkspace, 5
bindu = $mod&SHIFT, 6, movetoworkspace, 6
bindu = $mod&SHIFT, 7, movetoworkspace, 7
bindu = $mod&SHIFT, 8, movetoworkspace, 8
bindu = $mod&SHIFT, 9, movetoworkspace, 9
bindu = $mod&SHIFT, 0, movetoworkspace, 10

bindu = $mod&CONTROL, 1, movetoworkspacesilent, 1
bindu = $mod&CONTROL, 2, movetoworkspacesilent, 2
bindu = $mod&CONTROL, 3, movetoworkspacesilent, 3
bindu = $mod&CONTROL, 4, movetoworkspacesilent, 4
bindu = $mod&CONTROL, 5, movetoworkspacesilent, 5
bindu = $mod&CONTROL, 6, movetoworkspacesilent, 6
bindu = $mod&CONTROL, 7, movetoworkspacesilent, 7
bindu = $mod&CONTROL, 8, movetoworkspacesilent, 8
bindu = $mod&CONTROL, 9, movetoworkspacesilent, 9
bindu = $mod&CONTROL, 0, movetoworkspacesilent, 10

# special workspaces
bind = $mod, O, togglespecialworkspace, scratchpad
bind = $mod&SHIFT, O, movetoworkspace, special:scratchpad

bind = $mod, T, togglespecialworkspace, social

#  __  __ ___ ____ _____ 
# |  \/  |_ _/ ___| ____|
# | |\/| || | |   |  _|  
# | |  | || | |___| |___ 
# |_|  |_|___\____|_____|
                       
bindum = $mod, mouse:272, movewindow
bindum = $mod, mouse:273, resizewindow


#  _   _ _____ ___ _     ___ _____ ___ _____ ____  
# | | | |_   _|_ _| |   |_ _|_   _|_ _| ____/ ___| 
# | | | | | |  | || |    | |  | |  | ||  _| \___ \ 
# | |_| | | |  | || |___ | |  | |  | || |___ ___) |
#  \___/  |_| |___|_____|___| |_| |___|_____|____/ 
                                                 
bind = $mod&SHIFT, L, exec, ~/.config/hypr/scripts/lock.sh
bindu = $mod, RETURN, exec, $cmd_start_app $terminal #terminal accesable in all bind maps
bind = $mod, R, exec, $cmd_start_app $appsMenu
bind = $mod SHIFT, R, exec, $cmd_start_app $shellMenu
bind = $mod, V, exec, $cmd_start_app cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod CONTROL, V, exec, $cmd_start_app cliphist wipe & notify-send "Wiped clipboard list: " "$(cliphist list)"
bind = , Print, exec, $cmd_start_app grim
bind = SHIFT, Print, exec, $cmd_start_app grim -g "$(slurp -w 0)" - | swappy -f -

#  ____  _   _ ____  __  __    _    ____  ____  
# / ___|| | | | __ )|  \/  |  / \  |  _ \/ ___| 
# \___ \| | | |  _ \| |\/| | / _ \ | |_) \___ \ 
#  ___) | |_| | |_) | |  | |/ ___ \|  __/ ___) |
# |____/ \___/|____/|_|  |_/_/   \_\_|   |____/ 
                                              
# Applications map
bind = $mod, A, submap, APPS #activate APPlications submap
submap = APPS, reset
source = ./submaps/apps.conf
bind = , ESCAPE, submap, reset
submap = reset

# Window size
bind = $mod, S, submap, RESIZE #Window Size
submap = RESIZE
source = ./submaps/resize.conf
bind = , ESCAPE, submap, reset
submap = reset

# Move window
bind = $mod, M, submap, MOVE
submap = MOVE
source = ./submaps/move.conf
bind = , ESCAPE, submap, reset
submap = reset

# Workspaces manipulation
bind = $mod, W, submap, WORKSPACE
submap = WORKSPACE
source = ./submaps/workspace.conf
bind = , ESCAPE, submap, reset
submap = reset

# Player control
bind = $mod, P, submap, PLAYER
submap = PLAYER
source = ./submaps/player.conf
bind = , ESCAPE, submap, reset
submap = reset

# wallpaper control
bind = $mod, B, submap, BACKGROUND
submap = BACKGROUND
source = ./submaps/wallpaper.conf
bind = , ESCAPE, submap, reset
submap = reset

#  _  _________   ______   ___    _    ____  ____  
# | |/ / ____\ \ / / __ ) / _ \  / \  |  _ \|  _ \ 
# | ' /|  _|  \ V /|  _ \| | | |/ _ \ | |_) | | | |
# | . \| |___  | | | |_) | |_| / ___ \|  _ <| |_| |
# |_|\_\_____| |_| |____/ \___/_/   \_\_| \_\____/ 
                                                 
# MISC
bindu = , XF86Search, exec, $cmd_start_app $appsMenu
bindu = , XF86Explorer, exec, $cmd_start_app $fileManager
bindu = , XF86Calculator, exec, $cmd_start_app $terminal -e calc

# MEDIA
bindul = , XF86AudioNext, exec, playerctl next
bindul = , XF86AudioPrev, exec, playerctl previous
bindul = , XF86AudioPlay, exec, playerctl play-pause
bindul = , XF86AudioStop, exec, playerctl stop

bindu = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

binduel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binduel = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-
binduel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
                           
# SCREEN
binduel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 1%+
binduel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 1%-
